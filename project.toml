[project]
name = "httprexx"
version = "1.0.0-dev"
# CGI handler load module (REXX Server Pages). The rexx370 IRX services are
# resolved at runtime against the modules already installed on the system
# (IRXINIT/IRXEXEC/IRXTERM), so rexx370 is NOT a build dependency — only its
# headers are vendored under include/ (see doc/rexx370-bindings.md).
type = "application"

[build]
# gnu99 for the CGI glue (mixed decls, // comments, snprintf, stdbool).
# -I include picks up httprexx's own headers and the vendored IRX headers.
cflags = ["-std=gnu99", "-I", "include"]

# ── Load module: the REXX CGI handler ───────────────────────────────
# startup=crt1 for the threading runtime (@@CRT1), same as httplua. The CGI
# entry calls main(); httpd/httpc come from the GRT (grtapp1/grtapp2).
[[module]]
name = "HTTPREXX"
startup = "crt1"
sources = ["src/*.c"]

[dependencies]
"mvslovers/httpd" = "=4.0.0-dev"
"mvslovers/ufsd" = "=1.0.0-dev"

[release]
version_files = ["VERSION"]
